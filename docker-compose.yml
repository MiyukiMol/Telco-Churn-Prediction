services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: streamlit run app/app.py --server.port 7860 --server.address 0.0.0.0
    ports:
      - "7860:7860"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend
